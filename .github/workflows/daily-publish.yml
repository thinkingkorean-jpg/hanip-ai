name: 🍪 Daily AI Newsletter Publisher

on:
  schedule:
    # 매일 한국시간 오전 7시 = UTC 22:00
    - cron: '0 22 * * *'
  # 수동 실행 지원
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 코드 체크아웃 (Checkout Repo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Python 3.10 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 필요 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: 🤖 뉴스레터 자동 생성 엔진 가동
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/run_daily.py

      - name: 🚀 생성된 HTML 파일 GitHub에 자동 푸시
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html archive.html articles/ scripts/data/
          # 변경사항이 있을 때만 커밋 (에러 방지)
          git commit -m "🚀 Auto-published daily newsletter [$(date +'%Y-%m-%d')]" || echo "No changes to commit"
          git push
