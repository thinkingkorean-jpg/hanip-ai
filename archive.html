<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="한입 AI 뉴스레터 아카이브. 날짜별 발행본을 빠르게 다시 찾아보세요.">
  <title>아카이브 — 한입 AI</title>
  <link rel="icon" type="image/png" href="assets/hannip.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-gradient"></div>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <img src="assets/hannip.png" alt="한입이" class="logo-icon">
        <div>
          <div class="logo-text">한입 AI</div>
          <div class="logo-sub">매일 한입, 세상을 떠먹여드립니다</div>
        </div>
      </a>
      <div class="header-actions">
        <a href="archive.html" style="color: var(--primary); font-size: 0.9rem; font-weight: 600;">아카이브</a>
        <button class="theme-toggle" id="themeToggle" aria-label="테마 전환">🌙</button>
      </div>
    </div>
  </header>

  <main class="main" data-latest-article="2026-04-20">
    <section class="hero">
      <h1 class="hero-title">뉴스레터 아카이브</h1>
      <p class="hero-subtitle">발행된 한입 AI를 날짜별로 다시 읽어보세요.</p>
    </section>

    <div style="margin-bottom: var(--space-xl);">
      <input
        type="text"
        class="subscribe-input"
        placeholder="키워드로 검색하세요"
        id="archiveSearch"
        style="width: 100%; max-width: 100%;"
      >
    </div>

    <div class="archive-grid" id="archiveGrid">
      <article class="headline-card">
        <h3 class="headline-title">아카이브를 불러오는 중입니다.</h3>
        <div class="headline-body">
          <p>잠시만 기다려주세요.</p>
        </div>
      </article>
    </div>
  </main>

  <footer class="footer">
    <div class="footer-logo">한입 AI</div>
    <p class="footer-desc">매일 한입, 세상을 떠먹여드립니다 🐻</p>
    <nav class="footer-links">
      <a href="index.html">오늘의 뉴스</a>
      <a href="archive.html">아카이브</a>
      <a href="index.html#subscribe">이메일 구독</a>
    </nav>
    <p class="footer-copy">© 2026 한입 AI (Hannip). All rights reserved.</p>
  </footer>

  <script src="app.js"></script>
  <script>
    const archiveGrid = document.getElementById("archiveGrid");
    const archiveSearch = document.getElementById("archiveSearch");
    let archiveEntries = [];

    function formatArchiveDate(dateText) {
      const date = new Date(`${dateText}T00:00:00`);
      return {
        day: String(date.getDate()),
        month: `${date.getMonth() + 1}월`,
      };
    }

    function renderArchive(entries) {
      if (!entries.length) {
        archiveGrid.innerHTML = `
          <article class="headline-card">
            <h3 class="headline-title">아직 발행된 아카이브가 없습니다.</h3>
            <div class="headline-body"><p>첫 발행본이 생성되면 이곳에 자동으로 표시됩니다.</p></div>
          </article>
        `;
        return;
      }

      archiveGrid.innerHTML = entries
        .map((entry) => {
          const formatted = formatArchiveDate(entry.date);
          return `
            <a href="${entry.href}" class="archive-item">
              <div class="archive-date">
                <div class="day">${formatted.day}</div>
                <div class="month">${formatted.month}</div>
              </div>
              <div class="archive-info">
                <h3>${entry.title}</h3>
                <p>${entry.description || "한입 AI 발행본 다시 읽기"}</p>
              </div>
            </a>
          `;
        })
        .join("");
    }

    async function loadArchive() {
      try {
        const response = await fetch(`articles/index.json?t=${Date.now()}`);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        archiveEntries = await response.json();
        renderArchive(archiveEntries);
      } catch (error) {
        archiveGrid.innerHTML = `
          <article class="headline-card">
            <h3 class="headline-title">아카이브를 불러오지 못했습니다.</h3>
            <div class="headline-body"><p>articles/index.json 파일을 확인해주세요.</p></div>
          </article>
        `;
      }
    }

    archiveSearch?.addEventListener("input", (event) => {
      const query = event.target.value.trim().toLowerCase();
      const filtered = archiveEntries.filter((entry) => {
        return [entry.title, entry.description, entry.date].join(" ").toLowerCase().includes(query);
      });
      renderArchive(filtered);
    });

    loadArchive();
  </script>
</body>
</html>
